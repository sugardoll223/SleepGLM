_base_: finetune.yaml

experiment:
  name: mainmodel_stage3_downstream_finetune
  stage: stage3_downstream_finetune
  output_dir: outputs/mainmodel_stage3_downstream_finetune

data:
  # Use pre-generated split manifest.
  split_file: configs/splits/sleepedf.json
  split_root_dir: dset/Sleep-EDF
  # Main downstream method: sequence-to-sequence sleep staging.
  return_sequence: true
  sequence_label_pad_value: -100
  # Seq2seq batch size is measured in full sequences (roughly one record/night).
  train_batch_size: 32
  val_batch_size: 32
  test_batch_size: 32
  drop_last: false

training:
  epochs: 100
  downstream_task: sleep_staging
  downstream_method: seq2seq
  early_stopping:
    enabled: true
    metric: loss
    mode: min
    patience: 30
    min_delta: 0.0

finetune:
  # Warm up the downstream prediction head, then unfreeze the backbone.
  freeze_backbone_epochs: 2
