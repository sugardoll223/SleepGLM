_base_: finetune.yaml

experiment:
  name: mainmodel_stage3_downstream_finetune
  stage: stage3_downstream_finetune
  output_dir: outputs/mainmodel_stage3_downstream_finetune

data:
  # Use pre-generated split manifest.
  split_file: configs/splits/sleepedf.json
  split_root_dir: dset/Sleep-EDF
  return_sequence: true
  sequence_label_pad_value: -100
  drop_last: false

training:
  epochs: 1440
  downstream_task: sleep_staging

finetune:
  freeze_backbone_epochs: 1440

