_base_: finetune.yaml

experiment:
  name: mainmodel_stage3_downstream_finetune
  stage: stage3_downstream_finetune
  output_dir: outputs/mainmodel_stage3_downstream_finetune

data:
  overnight_sequence:
    enabled: true
    target_epochs: 1440
    # Short nights are padded to target length; long nights can be chunked.
    pad_mode: zeros
    split_long_recording:
      enabled: true
      chunk_epochs: 360
      overlap_epochs: 30

training:
  epochs: 1440
  # Stage-3 recipe metadata (downstream overnight sleep staging).
  stage3_downstream:
    enabled: true
    task: overnight_sleep_staging
    target_epochs: 1440
    freeze_backbone: true

finetune:
  freeze_backbone_epochs: 1440

