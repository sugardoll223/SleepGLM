_base_: pretrain.yaml

experiment:
  name: mainmodel_stage2_multimodal_pretrain
  stage: stage2_multimodal_pretrain
  output_dir: outputs/mainmodel_stage2_multimodal_pretrain

training:
  # Stage-2 recipe metadata (for multi-view multimodal pretraining).
  stage2_multimodal:
    enabled: true
    # Optional stage1 -> stage2 warm start for EEG encoder only.
    # Keep false to train stage2 from scratch (no stage1 EEG initialization).
    init_eeg_encoder_from_stage1: false
    stage1_checkpoint: ""
    # LeJEPA trade-off weight: total = (1-lamb)*pred_loss + lamb*sigreg_loss
    lamb: 0.05
    global_views:
      - all_modalities_present
    local_views:
      - eeg_only
      - eeg_plus_eog
      - missing_any_one_or_two_modalities
    planned_missing_views: 6
  view_dropout:
    enabled: true
    force_drop_modalities: []
    random_modality_drop_prob: 0.0
    random_channel_drop_prob: 0.0

