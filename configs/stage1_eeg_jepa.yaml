_base_: base.yaml

experiment:
  name: mainmodel_stage1_eeg_jepa
  stage: stage1_eeg_jepa
  output_dir: outputs/mainmodel_stage1_eeg_jepa

data:
  # Use repository split manifest instead of placeholder /path/to/*.h5.
  split_file: configs/splits/sleepedf.json
  split_root_dir: dset/Sleep-EDF
  train_files: []
  val_files: []
  test_files: []
  train_batch_size: 64
  val_batch_size: 64

training:
  epochs: 80
  view_dropout:
    enabled: false
    force_drop_modalities: []
    random_modality_drop_prob: 0.0
    random_channel_drop_prob: 0.0
  # Stage-1 LeJEPA-style objective configuration.
  stage1_eeg_jepa:
    enabled: true
    global_loss_weight: 1.0
    local_loss_weight: 1.0
    weak_jitter_std: 0.02
    weak_scale_low: 0.95
    weak_scale_high: 1.05
    weak_time_mask_prob: 0.02
    global_views:
      - weak_aug_view_a
      - weak_aug_view_b
    local_views:
      multi_channel:
        groups: [C, P, O]
        num_views: 3
      single_channel:
        num_views: 6
  optimizer:
    lr: 3.0e-4
  scheduler:
    warmup_epochs: 8
